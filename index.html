<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naija Shop Manager</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛍️</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            background: '#F4F6F8',
            surface: '#FFFFFF',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
    }
    body { 
      font-family: 'Inter', sans-serif; 
      background-color: #F4F6F8; 
      color: #1E293B; 
      -webkit-font-smoothing: antialiased; 
      -moz-osx-font-smoothing: grayscale; 
    }
    h1, h2, h3, h4, h5, h6 { 
      font-weight: 600; 
      letter-spacing: -0.025em; 
      color: #0F172A;
    }
    
    /* Elegant modern rounded scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.25);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.45);
    }

    input, select, textarea {
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1) !important;
    }
    
    /* Animation classes */
    .stagger-1 { animation: slideUp 400ms var(--ease-out) forwards; animation-delay: 50ms; opacity: 0; }
    .stagger-2 { animation: slideUp 400ms var(--ease-out) forwards; animation-delay: 100ms; opacity: 0; }
    .stagger-3 { animation: slideUp 400ms var(--ease-out) forwards; animation-delay: 150ms; opacity: 0; }
    .stagger-4 { animation: slideUp 400ms var(--ease-out) forwards; animation-delay: 200ms; opacity: 0; }
    
    @keyframes slideUp {
      from { transform: translateY(12px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .btn-press {
      transition: transform 160ms var(--ease-out), filter 160ms var(--ease-out);
    }
    .btn-press:active {
      transform: scale(0.96);
      filter: brightness(0.95);
    }
    
    .brutalist-card {
      background: white;
      border: 1px solid #E2E8F0;
      box-shadow: 0 4px 0 #F1F5F9;
      border-radius: 16px;
      transition: transform 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
    }
    .brutalist-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #E2E8F0;
    }
    .brutalist-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #E2E8F0;
    }
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
    }

    /* Simple fix for markdown list styles in Tailwind prose */
    .prose ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .prose ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }

    .prose li {
      margin-bottom: 0.25rem;
    }

    .prose h1,
    .prose h2,
    .prose h3 {
      font-weight: 800;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }

    /* PROFESSIONAL PDF/PRINT EXPORT STYLES */
    @media print {
      @page {
        margin: 0.5cm;
        size: auto;
      }

      header,
      aside,
      nav,
      footer,
      button,
      .no-print,
      .fixed-action-bar,
      [role="navigation"],
      div[class*="w-64"],
      /* Sidebar container */
      .sticky,
      .fixed {
        display: none !important;
      }

      body,
      #root,
      .min-h-screen,
      main {
        display: block !important;
        overflow: visible !important;
        position: static !important;
        width: 100% !important;
        background: white !important;
        color: black !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .bg-slate-50,
      .bg-slate-100,
      .bg-indigo-50,
      .bg-slate-900 {
        background-color: transparent !important;
      }

      .text-white {
        color: black !important;
      }

      .shadow-sm,
      .shadow-md,
      .shadow-lg,
      .shadow-xl,
      .shadow-2xl {
        box-shadow: none !important;
        border: 1px solid #eee !important;
      }

      table {
        width: 100% !important;
        border-collapse: collapse !important;
        page-break-inside: auto;
      }

      tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }

      thead {
        display: table-header-group !important;
      }

      td,
      th {
        border: 1px solid #ddd !important;
        padding: 8px !important;
        color: black !important;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-markdown": "https://esm.sh/react-markdown@^9.0.1",
    "remark-gfm": "https://esm.sh/remark-gfm@^4.0.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.48.1",
    "xlsx": "https://esm.sh/xlsx@0.18.5"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
